name: DevSecOps Pipeline

# Secure Software Development CI/CD
# Automated security testing for ISRO/DoS academic project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Manual trigger

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '18'

jobs:
  # Job 1: SAST (Static Application Security Testing)
  sast:
    name: Static Security Analysis (Bandit)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit bandit-sarif-formatter
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run Bandit security scan
        run: |
          bandit -r . \
            --exclude ./venv,./env,./node_modules,./frontend/node_modules,./models,./data \
            --format sarif \
            --output reports/bandit_results.sarif \
            --severity-level low \
            --confidence-level low \
            || true
        continue-on-error: true
      
      - name: Upload Bandit results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/bandit_results.sarif
          category: bandit
      
      - name: Upload Bandit report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: reports/bandit_results.sarif

  # Job 2: Dependency Scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Safety
        run: pip install safety
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run Safety check
        run: |
          safety check --json --output reports/safety_report.json || true
          safety check || true
        continue-on-error: true
      
      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report
          path: reports/safety_report.json

  # Job 3: Code Quality & Linting
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting tools
        run: |
          pip install flake8 mypy black isort
      
      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Run MyPy type checking
        run: |
          mypy . --ignore-missing-imports --no-strict-optional || true
        continue-on-error: true
      
      - name: Check code formatting (Black)
        run: |
          black --check . || true
        continue-on-error: true

  # Job 4: Unit Tests with Coverage
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
        continue-on-error: true
      
      - name: Run tests with coverage
        run: |
          if [ -d "tests" ]; then
            pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term
          else
            echo "No tests directory found - skipping tests"
            mkdir -p htmlcov
            echo "<html><body><h1>No tests found</h1></body></html>" > htmlcov/index.html
          fi
        continue-on-error: true
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  # Job 5: DAST (Dynamic Application Security Testing)
  dast:
    name: Dynamic Security Testing (OWASP ZAP)
    runs-on: ubuntu-latest
    if: false  # Disabled - requires trained model and takes long time
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Generate sample data
        run: |
          python scripts/generate_sample_logs.py --output data/benign_logs --count 1000
      
      - name: Start WAF API in background
        run: |
          WAF_DEVICE=cpu WAF_MODEL_PATH=models/waf_transformer python -m api.waf_api &
          sleep 30  # Wait for API to be ready
      
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://127.0.0.1:8000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
      
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: zap_*

  # Job 6: Frontend Security
  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install
        continue-on-error: true
      
      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --production || true
        continue-on-error: true
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build || true
        continue-on-error: true

  # Job 7: Docker Security Scan
  docker-security:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: false  # Disabled - requires full model dependencies and takes long time
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t transformer-waf:test .
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'transformer-waf:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 8: Security Report Summary
  security-summary:
    name: Security Summary Report
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan, code-quality, unit-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-report'
          merge-multiple: true
        continue-on-error: true
      
      - name: Generate summary
        run: |
          echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SAST (Bandit): Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Scan: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Quality: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit Tests: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Review artifacts for detailed findings**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Automated DevSecOps Pipeline - ISRO/DoS Secure Software Development*" >> $GITHUB_STEP_SUMMARY

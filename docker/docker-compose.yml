# Docker Compose for Transformer WAF
# Production-grade multi-service deployment with security hardening
# For ISRO / Department of Space Academic Evaluation

version: '3.8'

services:
  # ==================== WAF API Service ====================
  waf-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: waf-api
    ports:
      - "8000:8000"
    volumes:
      # Model directory (read-only for security)
      - ../models:/app/models:ro
      # Logs directory (read-write)
      - ../logs:/app/logs:rw
      # Data directory for scan history (optional)
      - waf-data:/app/data:rw
    environment:
      # Model configuration
      - WAF_MODEL_PATH=/app/models/waf_transformer
      - WAF_DEVICE=cpu  # Change to 'cuda' for GPU
      
      # Detection settings
      - WAF_ANOMALY_THRESHOLD=0.75
      - WAF_CACHE_SIZE=10000
      
      # API settings
      - WAF_API_HOST=0.0.0.0
      - WAF_API_PORT=8000
      
      # Logging
      - WAF_LOG_LEVEL=INFO
      - WAF_MASK_PII=true
      - WAF_ALERT_LOG_FILE=/app/logs/alerts.jsonl
      
      # Security
      - WAF_RATE_LIMIT=100
      - WAF_RATE_LIMIT_WINDOW=60
      
      # Redis cache (optional)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    
    # Security hardening
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp.json
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    
    restart: unless-stopped
    
    depends_on:
      redis:
        condition: service_healthy
    
    networks:
      - waf-network
  
  # ==================== React Dashboard ====================
  waf-dashboard:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: waf-dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://waf-api:8000
      - NODE_ENV=production
    
    # Security
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=50m
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    
    restart: unless-stopped
    
    depends_on:
      waf-api:
        condition: service_healthy
    
    networks:
      - waf-network
  
  # ==================== Redis Cache ====================
  redis:
    image: redis:7-alpine
    container_name: waf-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    
    # Security
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=50m
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    restart: unless-stopped
    
    networks:
      - waf-network
  
  # ==================== Nginx Reverse Proxy (Optional) ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: waf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../integration/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Place SSL certificates here
      - nginx-cache:/var/cache/nginx:rw
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    
    restart: unless-stopped
    
    depends_on:
      - waf-api
      - waf-dashboard
    
    networks:
      - waf-network
    
    # Uncomment for production deployment
    # profiles:
    #   - production

# ==================== Networks ====================
networks:
  waf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==================== Volumes ====================
volumes:
  waf-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local


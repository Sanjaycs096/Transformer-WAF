# Nginx Traffic Mirroring Configuration for Transformer WAF
# This configuration mirrors HTTP traffic to the WAF API without blocking requests

# Define upstream for WAF service
upstream waf_service {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Define upstream for your actual backend
upstream backend_app {
    server 127.0.0.1:3000;  # Change to your backend address
    keepalive 32;
}

server {
    listen 80;
    server_name example.com;  # Change to your domain
    
    # Access log
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log;
    
    # Main location - serves actual traffic
    location / {
        # Mirror traffic to WAF (non-blocking)
        mirror /waf_mirror;
        mirror_request_body on;
        
        # Proxy to your actual backend
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
    
    # Internal location for WAF mirroring
    location = /waf_mirror {
        internal;
        
        # Send to WAF API
        proxy_pass http://waf_service/scan;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Pass request metadata
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Pass original headers
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        
        # Don't wait for WAF response (fire and forget)
        proxy_ignore_client_abort on;
        
        # Short timeout (WAF should be fast)
        proxy_connect_timeout 1s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;
    }
    
    # Health check endpoint for WAF
    location /waf/health {
        proxy_pass http://waf_service/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # WAF statistics endpoint (optional, restrict access)
    location /waf/stats {
        # Restrict to localhost only
        allow 127.0.0.1;
        deny all;
        
        proxy_pass http://waf_service/stats;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# HTTPS configuration (recommended for production)
server {
    listen 443 ssl http2;
    server_name example.com;
    
    # SSL certificates
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Access log
    access_log /var/log/nginx/access_ssl.log combined;
    error_log /var/log/nginx/error_ssl.log;
    
    # Same mirroring setup as HTTP
    location / {
        mirror /waf_mirror;
        mirror_request_body on;
        
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location = /waf_mirror {
        internal;
        proxy_pass http://waf_service/scan;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_ignore_client_abort on;
        proxy_connect_timeout 1s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name example.com;
    return 301 https://$server_name$request_uri;
}

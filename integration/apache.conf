# Apache Traffic Mirroring Configuration for Transformer WAF
# This configuration sends a copy of traffic to the WAF API

# Enable required modules (add to httpd.conf or apache2.conf)
# LoadModule proxy_module modules/mod_proxy.so
# LoadModule proxy_http_module modules/mod_proxy_http.so
# LoadModule headers_module modules/mod_headers.so
# LoadModule rewrite_module modules/mod_rewrite.so

<VirtualHost *:80>
    ServerName example.com
    ServerAdmin admin@example.com
    
    # Document root (if serving static files)
    DocumentRoot /var/www/html
    
    # Access and error logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    
    # Enable proxying
    ProxyPreserveHost On
    ProxyRequests Off
    
    # Main application proxy
    <Location />
        # Proxy to your backend application
        ProxyPass http://localhost:3000/
        ProxyPassReverse http://localhost:3000/
        
        # Set headers
        RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s
        RequestHeader set X-Forwarded-Proto http
    </Location>
    
    # WAF scanning endpoint (called via RequestHeader/mod_security integration)
    <Location /waf/scan>
        # Proxy to WAF API
        ProxyPass http://localhost:8000/scan
        ProxyPassReverse http://localhost:8000/scan
        
        # Timeout settings (fast response expected)
        ProxyTimeout 2
    </Location>
    
    # WAF health check
    <Location /waf/health>
        ProxyPass http://localhost:8000/health
        ProxyPassReverse http://localhost:8000/health
    </Location>
    
    # WAF statistics (restrict access)
    <Location /waf/stats>
        ProxyPass http://localhost:8000/stats
        ProxyPassReverse http://localhost:8000/stats
        
        # Restrict to localhost
        Require ip 127.0.0.1
    </Location>
</VirtualHost>

# HTTPS configuration (recommended for production)
<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName example.com
        ServerAdmin admin@example.com
        
        DocumentRoot /var/www/html
        
        # SSL Engine
        SSLEngine on
        SSLCertificateFile /etc/ssl/certs/cert.pem
        SSLCertificateKeyFile /etc/ssl/private/key.pem
        
        # SSL protocols and ciphers
        SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
        SSLCipherSuite HIGH:!aNULL:!MD5
        SSLHonorCipherOrder on
        
        # Logs
        ErrorLog ${APACHE_LOG_DIR}/ssl_error.log
        CustomLog ${APACHE_LOG_DIR}/ssl_access.log combined
        
        # Enable proxying
        ProxyPreserveHost On
        ProxyRequests Off
        
        # Main application proxy
        <Location />
            ProxyPass http://localhost:3000/
            ProxyPassReverse http://localhost:3000/
            
            RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s
            RequestHeader set X-Forwarded-Proto https
        </Location>
        
        # WAF endpoints (same as HTTP)
        <Location /waf/scan>
            ProxyPass http://localhost:8000/scan
            ProxyPassReverse http://localhost:8000/scan
            ProxyTimeout 2
        </Location>
        
        <Location /waf/health>
            ProxyPass http://localhost:8000/health
            ProxyPassReverse http://localhost:8000/health
        </Location>
        
        <Location /waf/stats>
            ProxyPass http://localhost:8000/stats
            ProxyPassReverse http://localhost:8000/stats
            Require ip 127.0.0.1
        </Location>
    </VirtualHost>
</IfModule>

